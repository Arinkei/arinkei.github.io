<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            height: 2000px; /* 테스트를 위한 긴 페이지 */
        }

        .navbar {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.4s ease; /* 스크롤 시 변화를 위한 부드러운 전환 효과 */
        }

        .navbar.scrolled {
            background-color: #0078ff;
            padding: 10px 20px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
        }

        .navbar .logo {
            display: flex;
            align-items: center;
        }

        .navbar .logo img {
            height: 40px;
            margin-right: 10px;
        }

        .navbar .logo span {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .navbar.scrolled .logo span {
            color: #ffffff;
        }

        .navbar .nav-links {
            display: flex;
            align-items: center;
        }

        .navbar .nav-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }

        .navbar.scrolled .nav-links a {
            color: #ffffff;
        }

        .navbar .nav-icons {
            display: flex;
            align-items: center;
        }

        .navbar .nav-icons a {
            color: #333;
            text-decoration: none;
            margin-left: 20px;
            font-size: 1.2em;
        }

        .navbar.scrolled .nav-icons a {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .navbar .nav-links {
                display: none;
            }
        }
    </style>
    <title>ArinKei's Page</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <span>ArinKei</span>
        </div>
        <nav class="nav-links">
            <a href="#">나는...</a>
            <a href="#">통계</a>
            <a href="#">상품</a>
            <a href="#">이용 안내</a>
            <a href="#">고객센터</a>
        </nav>
        <div class="nav-icons">
            <a href="#"><i class="fas fa-user"></i></a>
            <a href="#"><i class="fas fa-shopping-cart"></i></a>
        </div>
    </header>

    <script>
        // 스크롤 이벤트 처리
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 60) { // 스크롤 위치가 60px 이상이면 스타일 변경
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
